<!DOCTYPE html>
<html>
<head>
    <title>AI EV Optimizer - Real-Time Optimization</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { margin: 0; display: flex; background: #0b0b0b; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #side { width: 30%; padding: 20px; border-right: 1px solid #333; background: #151515; text-align: center; overflow-y: auto; }
        #map-panel { width: 70%; position: relative; }
        #map-canvas { height: 100%; width: 100%; }
        .video { width: 100%; border-radius: 10px; border: 2px solid #444; }
        #status-bar { padding: 15px; margin-top: 15px; border-radius: 8px; font-weight: bold; }
        .safe   { background: #2ecc71; }
        .danger { background: #e74c3c; animation: pulse 1s infinite; }
        #controls { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 10px; width: 340px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 5px; background: #222; color: white; border: 1px solid #555; border-radius: 5px; box-sizing: border-box; }
        .vehicle-controls { display: flex; gap: 5px; margin-bottom: 10px; }
        .vehicle-controls select { flex: 2; margin-bottom: 0; }
        .vehicle-controls input  { flex: 1; margin-bottom: 0; text-align: center; }
        .suggestions { background: #222; position: absolute; width: 90%; z-index: 2000; max-height: 150px; overflow-y: auto; }
        .sug-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #333; font-size: 12px; }
        #warning-banner { display: none; background: #e74c3c; color: white; font-weight: bold; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 13px; }
        #energy-comparison { margin-top: 15px; text-align: left; }
        #energy-comparison h4 { color: #3498db; margin-bottom: 8px; font-size: 13px; }
        .route-card { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 12px; }
        .route-card.best { border-color: #2ecc71; }
        .route-card .badge { float: right; background: #2ecc71; color: black; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .route-card .savings { color: #f39c12; font-weight: bold; }
        #stop-box { display: none; background: #1a1a2e; border: 1px solid #e74c3c; border-radius: 8px; padding: 10px; margin-top: 10px; text-align: left; font-size: 12px; }
        #stop-box h4 { color: #e74c3c; margin: 0 0 5px 0; font-size: 13px; }
        #turn-alert { display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1001; background: rgba(0,0,0,0.92); border: 2px solid #3498db; border-radius: 12px; padding: 14px 24px; font-size: 16px; font-weight: bold; color: white; text-align: center; min-width: 280px; }
        #turn-alert .turn-dist { font-size: 12px; color: #3498db; margin-top: 4px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="side">
        <h2>Driver Safety</h2>
        <img class="video" src="{{ url_for('video_feed') }}">
        <div id="status-bar" class="safe">READY</div>
        <div id="warning-banner"></div>

        <div id="stop-box">
            <h4>⚠️ Suggested Stop</h4>
            <p id="stop-name" style="margin:0; color:white;"></p>
        </div>

        <div style="text-align:left; margin-top:15px;">
            <p id="dist-txt">Distance: -- km</p>
            <p id="cons-txt" style="color:#2ecc71">Energy: -- kWh</p>
            <p id="route-info" style="font-size:12px; color:#3498db;"></p>
        </div>

        <div id="energy-comparison"></div>
    </div>

    <div id="map-panel">
        <div id="controls">
            <div class="vehicle-controls">
                <select id="vehicleModel">
                    <option value="">Loading vehicles...</option>
                </select>
                <input type="number" id="passengerCount" value="1" min="1" max="5" title="Passengers">
            </div>
            <input type="text" id="start" placeholder="Start Location" oninput="debSearch(this, 's-list')">
            <div id="s-list" class="suggestions"></div>
            <input type="text" id="end" placeholder="Destination" oninput="debSearch(this, 'e-list')">
            <div id="e-list" class="suggestions"></div>
            <label style="font-size:12px; color:#aaa;">
                <input type="checkbox" id="urbanMode" style="width:auto; margin-right:5px;">
                Urban / City Driving
            </label>
            <button onclick="go()" style="width:100%; padding:10px; margin-top:8px; background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">
                OPTIMIZE ROUTE
            </button>
        </div>
        <div id="map-canvas"></div>
        <div id="turn-alert">
            <div id="turn-text">--</div>
            <div class="turn-dist" id="turn-dist"></div>
        </div>
    </div>

    <audio id="alarm-sound" loop src="{{ url_for('static', filename='alarm.mp3') }}"></audio>

    <!-- Leaflet MUST load before any JS that uses L or map -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ── Vehicle Icons ──────────────────────────────────────────
        const vehicleIcons = {
            "Tata Nexon EV":   "🚙",
            "Tesla Model 3":   "🏎️",
            "Mahindra XUV400": "🚗"
        };

        function makeVehicleIcon(vehicle) {
            return L.divIcon({
                html:       `<div style="font-size:28px; line-height:1;">${vehicleIcons[vehicle] || "🚗"}</div>`,
                className:  "",
                iconSize:   [30, 30],
                iconAnchor: [15, 15]
            });
        }

        // ── Map Setup (declared FIRST so navigation code can use it) ──
        var map            = L.map('map-canvas').setView([12.9344, 80.2130], 11);
        var routePathLayer = L.layerGroup().addTo(map);
        var markerLayer    = L.layerGroup().addTo(map);
        var currentRouteDist = null;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // ── Load vehicles from dataset on page load ────────────────
        async function loadVehicles() {
            try {
                const res    = await fetch('/get_vehicles');
                const data   = await res.json();
                const select = document.getElementById('vehicleModel');
                select.innerHTML = "";
                data.vehicles.forEach(v => {
                    const opt   = document.createElement('option');
                    opt.value   = v;
                    opt.text    = v;
                    if (v === "Tata Nexon EV") opt.selected = true;
                    select.appendChild(opt);
                });
            } catch(e) { console.warn("Could not load vehicles:", e); }
        }
        loadVehicles();

        // ── Navigation State ───────────────────────────────────────
        var currentSteps     = [];
        var positionMarker   = null;
        var watchId          = null;
        var navigationActive = false;

        // ── Haversine in metres ────────────────────────────────────
        function haversineM(lat1, lon1, lat2, lon2) {
            const R    = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a    = Math.sin(dLat/2)**2 +
                         Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
                         Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // ── Start navigation ───────────────────────────────────────
        function startNavigation(steps) {
            currentSteps     = [...steps];
            navigationActive = true;
            if (watchId !== null) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition(
                pos => updatePosition(pos.coords.latitude, pos.coords.longitude),
                err => console.warn("GPS error:", err.message),
                { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
            );
        }

        // ── Update live position marker + turn alerts ──────────────
        function updatePosition(lat, lon) {
            // Create or move position marker
            if (!positionMarker) {
                positionMarker = L.marker([lat, lon], {
                    icon: L.divIcon({
                        html: '<div style="font-size:26px">📍</div>',
                        className: "", iconSize: [30,30], iconAnchor: [15,15]
                    })
                }).addTo(map);
            } else {
                positionMarker.setLatLng([lat, lon]);
            }

            // Pan map to follow current position
            map.panTo([lat, lon]);

            if (currentSteps.length === 0) {
                document.getElementById('turn-alert').style.display = "none";
                return;
            }

            // Find nearest upcoming step
            let nearestDist = Infinity;
            let nearestIdx  = 0;
            currentSteps.forEach((step, i) => {
                const d = haversineM(lat, lon, step.lat, step.lon);
                if (d < nearestDist) { nearestDist = d; nearestIdx = i; }
            });

            const alertBox = document.getElementById('turn-alert');
            const turnText = document.getElementById('turn-text');
            const turnDist = document.getElementById('turn-dist');

            if (nearestDist < 150) {
                alertBox.style.display = "block";
                turnText.textContent   = currentSteps[nearestIdx].text;
                turnDist.textContent   = nearestDist < 30 ? "Turn now!" : `In ${Math.round(nearestDist)}m`;

                // Remove step once passed
                if (nearestDist < 20) {
                    currentSteps.splice(nearestIdx, 1);
                }
            } else {
                alertBox.style.display = "none";
            }
        }

        // ── Location Search ────────────────────────────────────────
        let timer;
        function debSearch(i, l) { clearTimeout(timer); timer = setTimeout(() => search(i, l), 600); }

        async function search(input, listId) {
            if (input.value.length < 3) return;
            const res  = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${input.value}&limit=5`);
            const data = await res.json();
            const list = document.getElementById(listId);
            list.innerHTML = "";
            data.forEach(item => {
                let d = document.createElement("div");
                d.className = "sug-item";
                d.innerText = item.display_name;
                d.onclick = () => {
                    input.value       = item.display_name;
                    input.dataset.lat = item.lat;
                    input.dataset.lon = item.lon;
                    list.innerHTML    = "";
                };
                list.appendChild(d);
            });
        }

        // ── Main Route Function ────────────────────────────────────
        async function go() {
            const s = document.getElementById('start').dataset;
            const e = document.getElementById('end').dataset;
            if (!s.lat || !e.lat) { alert("Please select both locations from suggestions."); return; }

            document.getElementById('route-info').innerText = "Fetching routes...";
            document.getElementById('energy-comparison').innerHTML = "";
            routePathLayer.clearLayers();
            markerLayer.clearLayers();

            // Stop previous navigation
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            document.getElementById('turn-alert').style.display = "none";

            const vehicle    = document.getElementById('vehicleModel').value;
            const passengers = document.getElementById('passengerCount').value;
            const urban      = document.getElementById('urbanMode').checked ? '1' : '0';
            const url = `/get_routes?orig_lat=${s.lat}&orig_lon=${s.lon}&dest_lat=${e.lat}&dest_lon=${e.lon}&vehicle=${encodeURIComponent(vehicle)}&passengers=${passengers}&urban=${urban}`;

            try {
                const res  = await fetch(url);
                const data = await res.json();
                if (data.error) { document.getElementById('route-info').innerText = "Error: " + data.error; return; }

                const routes  = data.routes;
                const bestKwh = routes[0].energy_kwh;

                // ── Draw routes ────────────────────────────────────
                routes.forEach((route, i) => {
                    const isBest  = i === 0;
                    const latlngs = route.geometry.map(pt => [pt[0], pt[1]]);
                    L.polyline(latlngs, {
                        color:     isBest ? '#2ecc71' : '#e74c3c',
                        weight:    isBest ? 7 : 4,
                        opacity:   isBest ? 1.0 : 0.5,
                        dashArray: isBest ? null : '8, 10'
                    }).addTo(routePathLayer).bindPopup(
                        `<b>${isBest ? '✅ Best' : 'Route ' + (i+1)} — ${route.energy_kwh.toFixed(3)} kWh</b><br>
                         Distance: ${route.distance_km} km<br>
                         Duration: ${route.duration_min.toFixed(1)} min<br>
                         Grade: ${route.grade_percent}%`
                    );
                });

                // ── Vehicle icon at origin ─────────────────────────
                L.marker([parseFloat(s.lat), parseFloat(s.lon)], {
                    icon: makeVehicleIcon(vehicle)
                }).addTo(markerLayer).bindPopup(`📍 Start — ${vehicle}`);

                L.marker([parseFloat(e.lat), parseFloat(e.lon)])
                 .addTo(markerLayer).bindPopup("🏁 Destination");

                // ── Sidebar info ───────────────────────────────────
                currentRouteDist = routes[0].distance_km;
                document.getElementById('dist-txt').innerText = "Distance: " + routes[0].distance_km + " km";
                document.getElementById('cons-txt').innerText = "Energy: "   + routes[0].energy_kwh.toFixed(3) + " kWh";

                // ── Start navigation if steps available ────────────
                if (routes[0].steps && routes[0].steps.length > 0) {
                    startNavigation(routes[0].steps);
                    document.getElementById('route-info').innerText =
                        routes.length > 1
                            ? `${routes.length} routes found — Navigation started`
                            : "Single route — Navigation started";
                } else {
                    document.getElementById('route-info').innerText =
                        routes.length > 1
                            ? `${routes.length} routes found — Best in green`
                            : "Single route available";
                }

                // ── Energy comparison cards ────────────────────────
                buildComparisonCards(routes, bestKwh);
                handleSafetyWarning(data.safety_warning);

            } catch (err) {
                document.getElementById('route-info').innerText = "Failed to fetch routes.";
                console.error(err);
            }
        }

        // ── Energy comparison cards ────────────────────────────────
        function buildComparisonCards(routes, bestKwh) {
            const container = document.getElementById('energy-comparison');
            container.innerHTML = "<h4>⚡ Route Energy Comparison</h4>";
            routes.forEach((route, i) => {
                const isBest  = i === 0;
                const savings = isBest ? 0 : ((route.energy_kwh - bestKwh) / bestKwh * 100).toFixed(1);
                const card    = document.createElement('div');
                card.className = "route-card" + (isBest ? " best" : "");
                card.innerHTML = `
                    ${isBest ? '<span class="badge">BEST</span>' : ''}
                    <b>Route ${i + 1}</b><br>
                    ⚡ ${route.energy_kwh.toFixed(3)} kWh &nbsp;|&nbsp; 📏 ${route.distance_km} km<br>
                    ⏱ ${route.duration_min.toFixed(1)} min &nbsp;|&nbsp; 📐 ${route.grade_percent}%
                    ${!isBest
                        ? `<br><span class="savings">+${savings}% more energy than best</span>`
                        : `<br><span style="color:#2ecc71">✅ Most efficient</span>`}
                `;
                container.appendChild(card);
            });
        }

        // ── Safety Warning ─────────────────────────────────────────
        function handleSafetyWarning(warning) {
            const banner = document.getElementById('warning-banner');
            const alarm  = document.getElementById('alarm-sound');
            if (warning && warning.alert) {
                banner.style.display = "block";
                banner.innerText     = "⚠️ " + warning.message;
            } else {
                banner.style.display = "none";
                alarm.pause();
            }
        }

        function showSuggestedStop(stop) {
            const box = document.getElementById('stop-box');
            if (stop) {
                document.getElementById('stop-name').innerText = "📍 " + stop.name;
                box.style.display = "block";
            } else {
                box.style.display = "none";
            }
        }

        // ── Live Sync (every 1s) ───────────────────────────────────
        const alarm = document.getElementById('alarm-sound');
        let canPlay = false;
        document.addEventListener('click', () => canPlay = true, { once: true });

        async function sync() {
            try {
                const vehicle    = document.getElementById('vehicleModel').value;
                const passengers = document.getElementById('passengerCount').value;
                const dist       = currentRouteDist || 0;
                const res  = await fetch(`/get_system_data?dist=${dist}&vehicle=${encodeURIComponent(vehicle)}&passengers=${passengers}`);
                const data = await res.json();
                const bar  = document.getElementById('status-bar');

                if (["Alert", "Looking Side", "Calibrating..."].includes(data.status)) {
                    bar.innerText = "STATUS: " + data.status.toUpperCase();
                    bar.className = "safe";
                    alarm.pause();
                    handleSafetyWarning(null);
                    showSuggestedStop(null);
                } else {
                    bar.innerText = "WARNING: " + data.status.toUpperCase();
                    bar.className = "danger";
                    if (canPlay) alarm.play().catch(() => {});
                    handleSafetyWarning(data.safety_warning);
                    showSuggestedStop(data.routes && data.routes.suggested_stop);
                }
            } catch(e) {}
        }

        setInterval(sync, 1000);
    </script>
</body>
</html>
